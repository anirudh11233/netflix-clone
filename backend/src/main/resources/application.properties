spring.application.name=netflix-clone-backend

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/netflixclone
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:anirudh1}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- File uploads (videos + posters) ---
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.upload-dir=${UPLOAD_DIR:uploads}

# --- Mail (dev: link is logged until Gmail app password is configured) ---
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:c2FpYW5uZXRmbGl4Y2xvbmVzdXBlcnNlY3JldGtleWZvcmp3dHNpZ25pbmcxMjM0NTY3OA==}
app.jwt.expiration-ms=86400000

# --- Frontend origin for links + CORS ---
app.frontend-url=http://localhost:4200
